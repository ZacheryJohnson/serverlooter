name: Main CI
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Install prerequisites
        run: sudo apt-get install -yqq pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Cache build
        uses: actions/cache@v4.2.3
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - name: Build
        run: cargo build --profile release

  build_wasm:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5
      - name: Install prerequisites
        run: sudo apt-get install -yqq pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Cache build
        uses: actions/cache@v4.2.3
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - name: Build
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          cargo install wasm-opt
          ./scripts/build-wasm.sh
      - name: Cache wasm artifacts
        uses: actions/cache@v4.2.3
        with:
          path: wasm_out/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-wasm-${{ github.run_id }}

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites
        run: sudo apt-get install -yqq pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Load cached build
        uses: actions/cache@v4.2.3
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-
      - name: Test
        run: cargo test --profile release

  upload:
    runs-on: ubuntu-latest
    needs: [build_wasm, test]

    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites
        run: sudo apt-get install -yqq pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Load wasm artifacts build
        uses: actions/cache@v4.2.3
        with:
          path: wasm_out/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-wasm-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-wasm-
      - name: Upload to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_BUTLER_CREDENTIALS }}
        run: |
          wget -O butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          ./butler login -i butler_creds
          ./scripts/itch-upload.sh . ./butler